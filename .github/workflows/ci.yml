name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    # Pinned, not windows-latest: that resolved to windows-2025-vs2026 (a very
    # recent image) and the test host process crashed outright there mid-run,
    # implicating tests with zero OS/COM interaction at all (TreemapLayoutTests,
    # IconGlyphMapTests - pure computation) - runner-image instability, not
    # anything in this repo's own tests. windows-2022 is long-established and
    # far more battle-tested for .NET/WinUI workloads.
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore FastExplorer.sln

      - name: Build
        run: dotnet build FastExplorer.sln -c Release --no-restore

      # Category=RequiresDesktop tests (ShellContextMenuTests, RecycleBinServiceTests,
      # FileSystemServiceTests.Delete_ToRecycleBin_ItemAppearsInRecycleBin) exercise
      # real Shell COM automation against the host's actual desktop/Recycle Bin -
      # these hung indefinitely (not failed) on a GitHub Actions Windows runner rather
      # than on a real machine, so they're excluded here specifically; run in full
      # locally (see CLAUDE.md). --blame-hang-timeout is a safety net so any other
      # future hang fails fast with a dump instead of running for hours.
      - name: Test
        run: >
          dotnet test FastExplorer.Tests/FastExplorer.Tests.csproj -c Release -p:Platform=x64
          --filter "Category!=RequiresDesktop"
          --blame-hang-timeout 120s --blame-hang-dump-type mini
