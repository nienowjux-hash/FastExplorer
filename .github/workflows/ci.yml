name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    # Pinned, not windows-latest: that resolved to windows-2025-vs2026 (a very
    # recent image) and the test host process crashed outright there mid-run,
    # implicating tests with zero OS/COM interaction at all (TreemapLayoutTests,
    # IconGlyphMapTests - pure computation) - runner-image instability, not
    # anything in this repo's own tests. windows-2022 is long-established and
    # far more battle-tested for .NET/WinUI workloads.
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore FastExplorer.sln

      - name: Build
        run: dotnet build FastExplorer.sln -c Release --no-restore

      # Framework-dependent, unpackaged WinUI 3 apps (WindowsPackageType=None, see
      # CLAUDE.md's Distribution section) auto-generate a module initializer that calls
      # the Windows App SDK Bootstrapper API the first time ANY type from FastExplorer.dll
      # is touched - including from the test host, the moment a test references
      # FileSystemItem/FileSystemService. Without the Windows App SDK Runtime actually
      # installed on the machine, that bootstrap call (MddBootstrapInitialize2) doesn't
      # fail fast - it hangs indefinitely, which is what was silently causing every prior
      # "Test host process crashed" failure here (confirmed by downloading the blame
      # hang-dump from a failed run and inspecting it with dotnet-dump: the stuck thread's
      # stack was exactly Delete_Permanently_RemovesFileFromDisk -> <Module>..cctor() ->
      # InitializeWindowsAppSDK() -> Bootstrap.TryInitialize() -> MddBootstrapInitialize2).
      # GitHub-hosted Windows runners don't have this runtime preinstalled, so it has to be
      # installed explicitly before running tests. Version pinned to match
      # FastExplorer.csproj's Microsoft.WindowsAppSDK package version (2.2.0) - bump both
      # together if that package version ever changes.
      - name: Install Windows App SDK Runtime
        shell: pwsh
        run: |
          $exe = Join-Path $env:RUNNER_TEMP "windowsappruntimeinstall-x64.exe"
          Invoke-WebRequest -Uri "https://aka.ms/windowsappsdk/2.2/2.2.0/windowsappruntimeinstall-x64.exe" -OutFile $exe
          & $exe --quiet
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Windows App SDK Runtime install failed with exit code $LASTEXITCODE"
            exit 1
          }

      # Category=RequiresDesktop tests (ShellContextMenuTests, RecycleBinServiceTests,
      # FileSystemServiceTests.Delete_ToRecycleBin_ItemAppearsInRecycleBin) exercise
      # real Shell COM automation against the host's actual desktop/Recycle Bin -
      # these hung indefinitely (not failed) on a GitHub Actions Windows runner rather
      # than on a real machine, so they're excluded here specifically; run in full
      # locally (see CLAUDE.md). --blame-hang-timeout is a safety net so any other
      # future hang fails fast with a dump instead of running for hours.
      - name: Test
        run: >
          dotnet test FastExplorer.Tests/FastExplorer.Tests.csproj -c Release -p:Platform=x64
          --filter "Category!=RequiresDesktop"
          --blame-hang-timeout 120s --blame-hang-dump-type mini

      # Only relevant if the Test step above still crashes/hangs - grabs the blame
      # hang-dump (and sequence log) so it can actually be analyzed instead of guessed
      # about again. No-ops (and uploads nothing) on a normal green run.
      - name: Upload test diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-diagnostics
          path: FastExplorer.Tests/TestResults/**
          if-no-files-found: ignore
