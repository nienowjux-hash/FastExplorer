name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore FastExplorer.sln

      - name: Build
        run: dotnet build FastExplorer.sln -c Release --no-restore

      - name: Test
        run: dotnet test FastExplorer.Tests/FastExplorer.Tests.csproj -c Release -p:Platform=x64
